name: Release Standalone Installers

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable via PyInstaller
        run: python build_executable.py

      - name: Prepare Release Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            mv dist/fypd.exe dist/fypd-windows.exe
          else
            mv dist/fypd dist/fypd-${{ matrix.platform }}
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fypd-windows.exe
            dist/fypd-macos-latest
            dist/fypd-ubuntu-22.04
